# Cluster A: Tailscale "egress proxy" that exposes Vault's ClusterIP service
# onto the tailnet at hostname `vault-cluster-a`.
#
# How it works: TS_DEST_IP=<vault clusterip> tells tailscaled "everything
# inbound on my tailnet IP, forward to this LAN target".
#
# Pre-req:
#   kubectl -n tailscale create secret generic tailscale-auth \
#     --from-literal=TS_AUTHKEY='tskey-auth-XXXX'
---
apiVersion: v1
kind: Namespace
metadata:
  name: tailscale
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: tailscale
  namespace: tailscale
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: tailscale
  namespace: tailscale
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create", "get", "update", "patch"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch", "get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: tailscale
  namespace: tailscale
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: tailscale
subjects:
  - kind: ServiceAccount
    name: tailscale
    namespace: tailscale
---
# Resolves Vault's ClusterIP at startup via a small init container so we don't
# have to hardcode it. Writes it into a Downward API-style env file.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vault-tailscale-proxy
  namespace: tailscale
  labels:
    app: vault-tailscale-proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vault-tailscale-proxy
  template:
    metadata:
      labels:
        app: vault-tailscale-proxy
    spec:
      serviceAccountName: tailscale
      initContainers:
        - name: resolve-vault-ip
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              set -e
              echo "Resolving vault.vault.svc.cluster.local..."
              VAULT_IP=$(nslookup vault.vault.svc.cluster.local | awk '/^Address: / { print $2 ; exit }')
              echo "Vault ClusterIP: ${VAULT_IP}"
              echo "TS_DEST_IP=${VAULT_IP}" > /shared/dest-ip.env
          volumeMounts:
            - name: shared
              mountPath: /shared
      containers:
        - name: tailscale
          image: tailscale/tailscale:stable
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              set -e
              source /shared/dest-ip.env
              export TS_DEST_IP
              echo "Forwarding tailnet traffic -> ${TS_DEST_IP}"
              exec /usr/local/bin/containerboot
          env:
            - name: TS_KUBE_SECRET
              value: "tailscale-state-vault-a"
            - name: TS_USERSPACE
              value: "false"
            - name: TS_AUTHKEY
              valueFrom:
                secretKeyRef:
                  name: tailscale-auth
                  key: TS_AUTHKEY
            - name: TS_HOSTNAME
              value: "vault-cluster-a"
            - name: TS_EXTRA_ARGS
              value: "--advertise-tags=tag:k8s-router"
          volumeMounts:
            - name: shared
              mountPath: /shared
            - name: dev-net-tun
              mountPath: /dev/net/tun
          securityContext:
            capabilities:
              add: ["NET_ADMIN"]
      volumes:
        - name: shared
          emptyDir: {}
        - name: dev-net-tun
          hostPath:
            path: /dev/net/tun
            type: CharDevice
