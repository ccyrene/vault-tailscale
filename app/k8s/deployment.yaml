apiVersion: apps/v1
kind: Deployment
metadata:
  name: vault-consumer
  namespace: app
  labels:
    app: vault-consumer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vault-consumer
  template:
    metadata:
      labels:
        app: vault-consumer
    spec:
      serviceAccountName: vault-consumer
      volumes:
        - name: agent-config
          configMap:
            name: vault-agent-config
        - name: vault-secrets
          emptyDir:
            medium: Memory
        - name: vault-home
          emptyDir: {}
        - name: tailscale-state
          emptyDir: {}
        - name: dev-net-tun
          hostPath:
            path: /dev/net/tun
            type: CharDevice
        - name: app-bin
          hostPath:
            path: /opt/vault-consumer
            type: Directory
        - name: jwt-token
          projected:
            sources:
              - serviceAccountToken:
                  path: vault-jwt
                  audience: vault
                  expirationSeconds: 600
      containers:
        # Tailscale sidecar — joins the tailnet, programs routes for the
        # whole pod's network namespace so other containers transparently
        # reach `vault-cluster-a` via MagicDNS.
        - name: tailscale
          image: tailscale/tailscale:stable
          imagePullPolicy: IfNotPresent
          env:
            - name: TS_KUBE_SECRET
              value: "tailscale-state-app-b"
            - name: TS_USERSPACE
              value: "false"
            - name: TS_AUTHKEY
              valueFrom:
                secretKeyRef:
                  name: tailscale-auth
                  key: TS_AUTHKEY
            - name: TS_HOSTNAME
              value: "app-cluster-b"
            - name: TS_EXTRA_ARGS
              value: "--accept-dns=true --advertise-tags=tag:k8s-router"
          securityContext:
            capabilities:
              add: ["NET_ADMIN"]
          volumeMounts:
            - name: tailscale-state
              mountPath: /var/lib/tailscale
            - name: dev-net-tun
              mountPath: /dev/net/tun

        - name: vault-agent
          image: hashicorp/vault:1.18
          args: ["agent", "-config=/etc/vault/agent.hcl"]
          volumeMounts:
            - name: agent-config
              mountPath: /etc/vault
            - name: vault-secrets
              mountPath: /vault/secrets
            - name: vault-home
              mountPath: /home/vault
            - name: jwt-token
              mountPath: /var/run/secrets/tokens

        - name: app
          image: busybox:1.36
          command: ["/opt/vault-consumer/app"]
          env:
            - name: SECRETS_FILE
              value: /vault/secrets/credentials
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 2
          volumeMounts:
            - name: vault-secrets
              mountPath: /vault/secrets
              readOnly: true
            - name: app-bin
              mountPath: /opt/vault-consumer
              readOnly: true
